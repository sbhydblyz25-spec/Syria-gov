name: Build Syria Gov APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تحديث لـ v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0' # تحديد نسخة مستقرة
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4 # التحديث المهم لـ v4
        with:
          name: syria-gov-app
          path: build/app/outputs/flutter-apk/app-release.apk
          
